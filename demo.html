<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>발로란트 오버레이 데모</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&family=Barlow+Semi+Condensed:wght@500;600&display=swap');
:root{
  --bg-void:#0a0e14;--bg-panel:#0f1923;--bg-panel-2:#16202b;
  --red:#ff4655;--teal:#18e0c4;--ice:#ece8e1;--dim:#7b8794;--gold:#f7d23e;
  --atk:var(--red);--def:var(--teal);
  --disp:'Teko','Arial Narrow',sans-serif;--cond:'Barlow Condensed','Arial Narrow',sans-serif;--semi:'Barlow Semi Condensed',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#06090d;color:var(--ice);font-family:var(--semi);padding:14px;-webkit-font-smoothing:antialiased}
.wrap{max-width:1100px;margin:0 auto}
.hint{color:var(--dim);font-size:12px;margin:0 0 10px;letter-spacing:.3px}
.hint b{color:var(--teal)}

/* viewport that scales the 1920x1080 stage down to fit */
.viewport{position:relative;width:100%;overflow:hidden;border-radius:8px;border:1px solid #1c2733;
  background:
    radial-gradient(120% 80% at 50% 0%,#1a2430 0%,#0d141c 45%,#070b10 100%);
}
.viewport::before{content:"GAME CAPTURE (예시 배경)";position:absolute;inset:0;display:grid;place-items:center;
  color:#1c2731;font-family:var(--cond);font-size:64px;letter-spacing:8px;pointer-events:none}
.scaler{position:absolute;top:0;left:0;width:1920px;height:1080px;transform-origin:top left}

/* ===== overlay styles (same as overlay.css) ===== */
.stage{position:absolute;inset:0}
.scorebar{position:absolute;top:18px;left:50%;transform:translateX(-50%);display:flex;align-items:stretch;height:92px;filter:drop-shadow(0 8px 22px rgba(0,0,0,.55))}
.team{display:flex;align-items:center;gap:14px;background:var(--bg-panel);padding:0 26px;min-width:300px}
.team.left{justify-content:flex-end;clip-path:polygon(0 0,100% 0,100% 100%,22px 100%);border-top:4px solid var(--team-a,#fff)}
.team.right{justify-content:flex-start;clip-path:polygon(0 0,100% 0,calc(100% - 22px) 100%,0 100%);border-top:4px solid var(--team-b,#fff)}
.logo{width:58px;height:58px;flex:0 0 58px;border-radius:6px;background:var(--bg-panel-2);display:grid;place-items:center;font-family:var(--disp);font-weight:700;font-size:30px;letter-spacing:.5px}
.logowrap{display:flex;flex-direction:column;align-items:center;gap:5px}
.mappips{display:flex;gap:5px;height:11px}
.mappips .mp{width:11px;height:11px;transform:rotate(45deg);background:#1b2733;border:1.5px solid #3a4b5b;transition:background .2s,box-shadow .2s}
.mappips .mp.won{box-shadow:0 0 8px currentColor}
.team .meta{display:flex;flex-direction:column;line-height:.92}
.team.right .meta{align-items:flex-end}
.tricode{font-family:var(--disp);font-weight:600;font-size:46px;letter-spacing:1px}
.team-name{font-family:var(--cond);font-weight:600;font-size:14px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim)}
.score{width:88px;display:grid;place-items:center;font-family:var(--disp);font-weight:600;font-size:62px;background:#0c141c}
.center{width:188px;background:var(--bg-void);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;clip-path:polygon(14px 0,calc(100% - 14px) 0,100% 100%,0 100%);padding:0 6px}
.phase-tag{position:absolute;top:6px;left:50%;transform:translateX(-50%);font-family:var(--cond);font-weight:700;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--dim)}
.timer{font-family:var(--disp);font-weight:600;font-size:54px;line-height:.86;letter-spacing:1px;margin-top:8px}
.timer.danger{color:var(--red);animation:pulse .9s ease-in-out infinite}
.timer.spike{color:var(--red)}
@keyframes pulse{50%{opacity:.45}}
.round-line{display:flex;align-items:center;gap:8px;font-family:var(--cond);font-weight:600;font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-top:-2px}
.round-line .map{color:var(--dim)}
.side-tag{width:54px;display:grid;place-items:center;background:#0c141c;font-family:var(--cond);font-weight:700;font-size:12px;letter-spacing:2px;writing-mode:vertical-rl;text-orientation:mixed;text-transform:uppercase}
.side-tag.atk{color:var(--atk)}.side-tag.def{color:var(--def)}
.side-tag .ico{font-size:18px;writing-mode:horizontal-tb;margin-bottom:4px}
.rail{position:absolute;top:140px;display:flex;flex-direction:column;gap:10px;width:332px}
.rail.left{left:24px}.rail.right{right:24px}
.pcard{position:relative;background:var(--bg-panel);border-radius:4px;overflow:hidden;padding:9px 12px 9px 14px;display:grid;grid-template-columns:46px 1fr;gap:11px;align-items:center;transition:opacity .25s,filter .25s}
.rail.left .pcard{border-left:4px solid var(--side,#fff)}
.rail.right .pcard{border-right:4px solid var(--side,#fff)}
.pcard.dead{opacity:.4;filter:grayscale(.7)}
.pcard.dead .weapon,.pcard.dead .abilities{visibility:hidden}
.agent{width:46px;height:46px;border-radius:5px;background:var(--bg-panel-2);display:grid;place-items:center;position:relative;font-family:var(--disp);font-weight:700;font-size:22px;overflow:hidden}
.pcard.dead .agent::after{content:'✕';position:absolute;inset:0;display:grid;place-items:center;font-size:26px;color:var(--red);background:rgba(10,14,20,.5)}
.pbody{display:flex;flex-direction:column;gap:5px;min-width:0}
.prow1{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.pname{font-family:var(--cond);font-weight:700;font-size:20px;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ult{display:flex;gap:3px;align-items:center;flex:0 0 auto}
.ult .pip{width:9px;height:9px;transform:rotate(45deg);background:#2b3947;border:1px solid #3c4b5a}
.ult .pip.full{background:var(--teal);border-color:var(--teal);box-shadow:0 0 6px rgba(24,224,196,.6)}
.ult.ready .pip{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(247,210,62,.8)}
.ult.ready{animation:ultglow 1.1s ease-in-out infinite}
@keyframes ultglow{50%{filter:brightness(1.35)}}
.prow2{display:flex;align-items:center;justify-content:space-between;gap:8px}
.weapon{display:flex;align-items:center;gap:6px;font-family:var(--cond);font-weight:600;font-size:14px;letter-spacing:1px;text-transform:uppercase;color:var(--dim)}
.credits{font-family:var(--cond);font-weight:700;font-size:14px;color:var(--gold);letter-spacing:.5px}
.credits::before{content:'$'}
.abilities{display:flex;gap:4px}
.ab{width:18px;height:18px;border-radius:3px;background:#202c38;border:1px solid #2e3d4b;display:grid;place-items:center;font-family:var(--cond);font-weight:700;font-size:11px;color:#5a6b7a}
.ab.on{background:rgba(24,224,196,.16);border-color:var(--teal);color:var(--teal)}
.prow3{display:flex;align-items:center;gap:7px}
.hpbar{flex:1;height:7px;background:#202c38;border-radius:2px;overflow:hidden}
.hpbar>i{display:block;height:100%;background:linear-gradient(90deg,#caa,#ece8e1);transition:width .25s}
.pcard.dead .hpbar>i{width:0!important}
.shield{display:flex;gap:2px}
.shield .s{width:10px;height:10px;border:1.5px solid #3a4a59;border-radius:1px}
.shield .s.on{background:var(--teal);border-color:var(--teal);box-shadow:0 0 4px rgba(24,224,196,.5)}
.camslot{position:absolute;bottom:28px;left:28px;width:320px;height:180px;background:var(--bg-panel);border:2px solid var(--side-cam,var(--red));border-radius:6px;overflow:hidden;display:none;clip-path:polygon(0 0,100% 0,100% 100%,18px 100%);box-shadow:0 10px 30px rgba(0,0,0,.5)}
.camslot.on{display:block}
.camslot .camlabel{position:absolute;left:0;bottom:0;background:var(--side-cam,var(--red));color:#0a0e14;font-family:var(--cond);font-weight:700;font-size:13px;letter-spacing:2px;padding:4px 14px 4px 12px;text-transform:uppercase;clip-path:polygon(0 0,100% 0,calc(100% - 10px) 100%,0 100%)}
.camslot .camfill{position:absolute;inset:0;display:grid;place-items:center;color:var(--dim);font-family:var(--cond);font-size:14px;letter-spacing:2px;text-transform:uppercase;background:repeating-linear-gradient(45deg,#0f1923,#0f1923 14px,#121d27 14px,#121d27 28px)}

/* ===== control bar ===== */
.controls{margin-top:12px;background:#0f1923;border:1px solid #1c2733;border-radius:8px;padding:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.controls .g{display:flex;gap:6px;align-items:center;padding:4px 10px;border-right:1px solid #20303d}
.controls .g:last-child{border-right:none}
.controls span.lbl{font-family:var(--cond);font-size:11px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;margin-right:2px}
.controls button{background:#1b2733;border:1px solid #2a3a48;color:var(--ice);border-radius:5px;padding:5px 10px;cursor:pointer;font:13px var(--semi)}
.controls button:hover{border-color:var(--teal)}
.controls button.on{background:var(--teal);border-color:var(--teal);color:#0a0e14;font-weight:700}
.controls button.red{background:var(--red);border-color:var(--red);color:#0a0e14;font-weight:700}
.controls b{font-family:var(--disp);font-size:20px;min-width:22px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <p class="hint">아래는 <b>실제 오버레이</b>입니다. 컨트롤 바 버튼을 눌러 스코어·공수·타이머·궁극기·캠 등을 실시간으로 바꿔보세요. (실전에서는 별도 컨트롤 패널 창에서 조작 → OBS 화면엔 오버레이만 송출)</p>
  <div class="viewport" id="viewport">
    <div class="scaler" id="scaler"><div class="stage" id="stage"></div></div>
  </div>
  <div class="controls" id="controls"></div>
</div>

<script>
const AGENTS=["Jett","Raze","Sova","Killjoy","Omen","Sage","Cypher","Viper","Breach","Fade"];
const WEAPONS=["Vandal","Phantom","Sheriff","Operator","Spectre","Classic","Ghost","Marshal"];
function P(name,agent,o={}){return Object.assign({name,agent,alive:true,hp:100,shield:2,credits:3900,weapon:"Vandal",ultCur:0,ultMax:7,abilities:{c:true,q:true,e:true},camOn:false},o);}

let STATE={
  match:{map:"Bind",round:14,phase:"LIVE",timer:38,attackingSide:"B",spike:false,bestOf:3},
  teams:{
    A:{name:"DRX Vipers",tricode:"DRX",color:"#3b82f6",score:8,logo:"",mapsWon:1},
    B:{name:"Gen.G Tigers",tricode:"GEN",color:"#f5b301",score:5,logo:"",mapsWon:0}
  },
  players:{
    A:[P("stax","Omen",{ultCur:5,credits:1200,weapon:"Phantom"}),P("Rb","Killjoy",{ultCur:7,ultMax:7,credits:800,weapon:"Vandal"}),
       P("Zest","Sova",{ultCur:3,hp:64,credits:400,weapon:"Spectre"}),P("BuZz","Raze",{ultCur:6,ultMax:8,credits:2400,weapon:"Vandal"}),
       P("MaKo","Sage",{ultCur:2,hp:0,alive:false,credits:200,weapon:"Sheriff",abilities:{c:false,q:true,e:false}})],
    B:[P("Meteor","Jett",{ultCur:6,ultMax:7,credits:3200,weapon:"Operator",shield:2}),P("Munchkin","Cypher",{ultCur:4,credits:1500,weapon:"Vandal"}),
       P("Karon","Viper",{ultCur:7,ultMax:7,credits:900,weapon:"Phantom",hp:88}),P("Lakia","Breach",{ultCur:5,ultMax:8,credits:600,weapon:"Spectre",hp:0,alive:false}),
       P("t3xture","Raze",{ultCur:2,ultMax:8,credits:4100,weapon:"Vandal",shield:1})]
  },
  cam:{on:true,team:"B",label:"t3xture POV"},
  ui:{showRails:true}
};

const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const n=document.createElement(t);if(c)n.className=c;if(h!=null)n.innerHTML=h;return n;};
const fmt=s=>{s=Math.max(0,Math.round(s));return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");};
const ini=n=>n.replace(/[^A-Za-z0-9]/g,"").slice(0,2).toUpperCase()||"–";

function ultPips(p){const w=el("div","ult"+(p.ultCur>=p.ultMax?" ready":""));for(let i=0;i<p.ultMax;i++)w.appendChild(el("div","pip"+(i<p.ultCur?" full":"")));return w;}
function abRow(p){const w=el("div","abilities");[["C",p.abilities.c],["Q",p.abilities.q],["E",p.abilities.e]].forEach(([k,o])=>w.appendChild(el("div","ab"+(o?" on":""),k)));return w;}
function shRow(n){const w=el("div","shield");for(let i=0;i<2;i++)w.appendChild(el("div","s"+(i<n?" on":"")));return w;}
function card(p,color){
  const c=el("div","pcard"+(p.alive?"":" dead"));c.style.setProperty("--side",color);
  const ag=el("div","agent",`<span>${ini(p.agent)}</span>`);c.appendChild(ag);
  const b=el("div","pbody");
  const r1=el("div","prow1");r1.appendChild(el("div","pname",p.name));r1.appendChild(ultPips(p));b.appendChild(r1);
  const r2=el("div","prow2");const w=el("div","weapon",`<span style="font-size:15px">▮</span><span>${p.weapon}</span>`);
  const right=el("div");right.style.cssText="display:flex;gap:8px;align-items:center";right.appendChild(abRow(p));right.appendChild(el("div","credits",String(p.credits)));
  r2.append(w,right);b.appendChild(r2);
  const r3=el("div","prow3");const hp=el("div","hpbar");hp.appendChild(Object.assign(el("i"),{style:`width:${p.hp}%`}));r3.appendChild(hp);r3.appendChild(shRow(p.shield));b.appendChild(r3);
  c.appendChild(b);return c;
}
function render(){
  const s=STATE,stage=$("#stage");stage.innerHTML="";
  document.documentElement.style.setProperty("--team-a",s.teams.A.color);
  document.documentElement.style.setProperty("--team-b",s.teams.B.color);
  const bar=el("div","scorebar");
  const tb=(t,k)=>{const x=el("div","team "+(k==="A"?"left":"right"));
    const wrap=el("div","logowrap");
    const lg=el("div","logo");lg.textContent=t.tricode.slice(0,3);wrap.appendChild(lg);
    const need=Math.ceil(s.match.bestOf/2);
    if(need>1){const mp=el("div","mappips");for(let i=0;i<need;i++){const d=el("div","mp"+(i<(t.mapsWon||0)?" won":""));if(i<(t.mapsWon||0)){d.style.background=t.color;d.style.borderColor=t.color;d.style.color=t.color;}mp.appendChild(d);}wrap.appendChild(mp);}
    const m=el("div","meta");m.appendChild(el("div","tricode",t.tricode));m.appendChild(el("div","team-name",t.name));
    x.append(wrap,m);return x;};
  const tag=mode=>{const t=el("div","side-tag "+mode);t.appendChild(el("div","ico",mode==="atk"?"⚔":"🛡"));t.appendChild(document.createTextNode(mode==="atk"?"ATK":"DEF"));return t;};
  const center=el("div","center");center.appendChild(el("div","phase-tag",s.match.phase));
  const danger=!s.match.spike&&s.match.timer<=10&&s.match.phase!=="POST";
  center.appendChild(el("div","timer"+(s.match.spike?" spike":(danger?" danger":"")),fmt(s.match.timer)));
  const rl=el("div","round-line");rl.appendChild(el("span",null,"RND "+s.match.round));rl.appendChild(el("span","map",s.match.map));center.appendChild(rl);
  const aSide=s.match.attackingSide==="A"?"atk":"def",bSide=s.match.attackingSide==="B"?"atk":"def";
  bar.append(tb(s.teams.A,"A"),el("div","score a",String(s.teams.A.score)),tag(aSide),center,tag(bSide),el("div","score b",String(s.teams.B.score)),tb(s.teams.B,"B"));
  stage.appendChild(bar);
  if(s.ui.showRails){
    const rA=el("div","rail left");s.players.A.forEach(p=>rA.appendChild(card(p,s.teams.A.color)));stage.appendChild(rA);
    const rB=el("div","rail right");s.players.B.forEach(p=>rB.appendChild(card(p,s.teams.B.color)));stage.appendChild(rB);
  }
  const cam=el("div","camslot"+(s.cam.on?" on":""));cam.style.setProperty("--side-cam",s.cam.team==="A"?s.teams.A.color:s.teams.B.color);
  if(s.cam.team==="B"){cam.style.left="auto";cam.style.right="28px";cam.style.clipPath="polygon(0 0,100% 0,calc(100% - 18px) 100%,0 100%)";}
  cam.appendChild(el("div","camfill","WEBCAM SOURCE"));cam.appendChild(el("div","camlabel",s.cam.label));stage.appendChild(cam);
}

/* fit 1920x1080 stage into the viewport width */
function fit(){const vp=$("#viewport"),sc=$("#scaler");const k=vp.clientWidth/1920;sc.style.transform=`scale(${k})`;vp.style.height=(1080*k)+"px";}
new ResizeObserver(fit).observe($("#viewport"));

/* ===== controls ===== */
let timerInt=null;
function ctrlBtn(label,cls,fn){const b=el("button",cls,label);b.onclick=()=>{fn(b);render();};return b;}
function buildControls(){
  const c=$("#controls");c.innerHTML="";
  const g=(lbl,...items)=>{const d=el("div","g");if(lbl)d.appendChild(el("span","lbl",lbl));d.append(...items);return d;};

  // score
  const sA=el("b",null,STATE.teams.A.score),sB=el("b",null,STATE.teams.B.score);
  c.append(g("스코어",
    ctrlBtn("−",null,()=>{STATE.teams.A.score=Math.max(0,STATE.teams.A.score-1);sA.textContent=STATE.teams.A.score;}),sA,
    ctrlBtn("+","red",()=>{STATE.teams.A.score++;sA.textContent=STATE.teams.A.score;}),
    el("span","lbl"," : "),
    ctrlBtn("−",null,()=>{STATE.teams.B.score=Math.max(0,STATE.teams.B.score-1);sB.textContent=STATE.teams.B.score;}),sB,
    ctrlBtn("+","red",()=>{STATE.teams.B.score++;sB.textContent=STATE.teams.B.score;})
  ));

  // round win (bumps score + round together — the common solo action)
  c.append(g("라운드 승",
    ctrlBtn("◀ DRX",null,()=>{STATE.teams.A.score++;STATE.match.round++;sA.textContent=STATE.teams.A.score;}),
    ctrlBtn("GEN ▶",null,()=>{STATE.teams.B.score++;STATE.match.round++;sB.textContent=STATE.teams.B.score;})
  ));

  // maps won (series)
  const mA=el("b",null,STATE.teams.A.mapsWon),mB=el("b",null,STATE.teams.B.mapsWon);
  c.append(g("맵 획득",
    ctrlBtn("+ DRX",null,()=>{STATE.teams.A.mapsWon=Math.min(2,STATE.teams.A.mapsWon+1);mA.textContent=STATE.teams.A.mapsWon;}),mA,
    ctrlBtn("+ GEN",null,()=>{STATE.teams.B.mapsWon=Math.min(2,STATE.teams.B.mapsWon+1);mB.textContent=STATE.teams.B.mapsWon;}),mB,
    ctrlBtn("↺",null,()=>{STATE.teams.A.mapsWon=0;STATE.teams.B.mapsWon=0;mA.textContent=0;mB.textContent=0;})
  ));

  // side swap
  c.append(g("공수",ctrlBtn("좌우 교체",null,()=>{STATE.match.attackingSide=STATE.match.attackingSide==="A"?"B":"A";})));

  // timer
  const run=ctrlBtn("▶ 타이머",null,b=>{
    if(timerInt){clearInterval(timerInt);timerInt=null;b.textContent="▶ 타이머";b.classList.remove("on");return;}
    b.textContent="⏸ 정지";b.classList.add("on");
    timerInt=setInterval(()=>{STATE.match.timer=Math.max(0,STATE.match.timer-1);render();if(STATE.match.timer<=0){clearInterval(timerInt);timerInt=null;b.textContent="▶ 타이머";b.classList.remove("on");}},1000);
  });
  c.append(g("타이머",run,ctrlBtn("+10s",null,()=>{STATE.match.timer+=10;})));

  // phase / spike
  c.append(g("국면",
    ctrlBtn("BUY",null,()=>STATE.match.phase="BUY"),
    ctrlBtn("LIVE",null,()=>STATE.match.phase="LIVE"),
    ctrlBtn("스파이크",STATE.match.spike?"red":"",b=>{STATE.match.spike=!STATE.match.spike;STATE.match.phase=STATE.match.spike?"PLANTED":"LIVE";b.classList.toggle("red",STATE.match.spike);})
  ));

  // kill / ult / cam
  c.append(g("선수",
    ctrlBtn("DRX 1번 처치/부활",null,()=>{const p=STATE.players.A[2];p.alive=!p.alive;p.hp=p.alive?100:0;}),
    ctrlBtn("Rb 궁 충전",null,()=>{const p=STATE.players.A[1];p.ultCur=p.ultCur>=p.ultMax?0:p.ultMax;})
  ));
  c.append(g("표시",
    ctrlBtn(STATE.ui.showRails?"선수 레일 ON":"선수 레일 OFF",STATE.ui.showRails?"on":"",b=>{STATE.ui.showRails=!STATE.ui.showRails;b.textContent=STATE.ui.showRails?"선수 레일 ON":"선수 레일 OFF";b.classList.toggle("on",STATE.ui.showRails);}),
    ctrlBtn(STATE.cam.on?"캠 ON":"캠 OFF",STATE.cam.on?"on":"",b=>{STATE.cam.on=!STATE.cam.on;b.textContent=STATE.cam.on?"캠 ON":"캠 OFF";b.classList.toggle("on",STATE.cam.on);})
  ));
}

render();fit();buildControls();
</script>
</body>
</html>
