<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>발로란트 오버레이 (무설치)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&family=Barlow+Semi+Condensed:wght@500;600&display=swap');
:root{
  --bg-void:#0a0e14;--bg-panel:#0f1923;--bg-panel-2:#16202b;
  --red:#ff4655;--teal:#18e0c4;--ice:#ece8e1;--dim:#7b8794;--gold:#f7d23e;--line:#26323f;
  --atk:var(--red);--def:var(--teal);
  --disp:'Teko','Arial Narrow',sans-serif;--cond:'Barlow Condensed','Arial Narrow',sans-serif;--semi:'Barlow Semi Condensed',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:transparent;font-family:var(--semi);-webkit-font-smoothing:antialiased;overflow:hidden}

.doc{position:relative;width:1920px;height:1480px;transform-origin:top left}
.overlay-zone{position:absolute;top:0;left:0;width:1920px;height:1080px;overflow:hidden;color:var(--ice)}
/* preview backdrop ONLY in a normal browser; in OBS the body gets .obs and this is removed */
body:not(.obs) .overlay-zone{background:radial-gradient(120% 80% at 50% 0%,#1a2430 0%,#0d141c 45%,#070b10 100%)}
body:not(.obs) .overlay-zone::after{content:"OBS에선 이 영역이 투명해져 게임 위에 겹쳐집니다";position:absolute;left:50%;top:54%;transform:translateX(-50%);color:#22303d;font-family:var(--cond);font-size:30px;letter-spacing:4px;pointer-events:none}

/* ===== overlay components ===== */
.stage{position:absolute;inset:0}
.scorebar{position:absolute;top:18px;left:50%;transform:translateX(-50%);display:flex;align-items:stretch;height:92px;filter:drop-shadow(0 8px 22px rgba(0,0,0,.55))}
.team{display:flex;align-items:center;gap:14px;background:var(--bg-panel);padding:0 26px;min-width:300px}
.team.left{justify-content:flex-end;clip-path:polygon(0 0,100% 0,100% 100%,22px 100%);border-top:4px solid var(--team-a,#fff)}
.team.right{justify-content:flex-start;clip-path:polygon(0 0,100% 0,calc(100% - 22px) 100%,0 100%);border-top:4px solid var(--team-b,#fff)}
.logo{width:58px;height:58px;flex:0 0 58px;border-radius:6px;background:var(--bg-panel-2);display:grid;place-items:center;font-family:var(--disp);font-weight:700;font-size:30px;letter-spacing:.5px;overflow:hidden}
.logo img{width:100%;height:100%;object-fit:contain}
.logowrap{display:flex;flex-direction:column;align-items:center;gap:5px}
.mappips{display:flex;gap:5px;height:11px}
.mappips .mp{width:11px;height:11px;transform:rotate(45deg);background:#1b2733;border:1.5px solid #3a4b5b;transition:background .2s,box-shadow .2s}
.mappips .mp.won{box-shadow:0 0 8px currentColor}
.team .meta{display:flex;flex-direction:column;line-height:.92}
.team.right .meta{align-items:flex-end}
.tricode{font-family:var(--disp);font-weight:600;font-size:46px;letter-spacing:1px}
.team-name{font-family:var(--cond);font-weight:600;font-size:14px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim)}
.score{width:88px;display:grid;place-items:center;font-family:var(--disp);font-weight:600;font-size:62px;background:#0c141c}
.center{width:188px;background:var(--bg-void);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;clip-path:polygon(14px 0,calc(100% - 14px) 0,100% 100%,0 100%);padding:0 6px}
.phase-tag{position:absolute;top:6px;left:50%;transform:translateX(-50%);font-family:var(--cond);font-weight:700;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--dim)}
.timer{font-family:var(--disp);font-weight:600;font-size:54px;line-height:.86;letter-spacing:1px;margin-top:8px}
.timer.danger{color:var(--red);animation:pulse .9s ease-in-out infinite}.timer.spike{color:var(--red)}
@keyframes pulse{50%{opacity:.45}}
.round-line{display:flex;align-items:center;gap:8px;font-family:var(--cond);font-weight:600;font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-top:-2px}
.round-line .map{color:var(--dim)}
.side-tag{width:54px;display:grid;place-items:center;background:#0c141c;font-family:var(--cond);font-weight:700;font-size:12px;letter-spacing:2px;writing-mode:vertical-rl;text-orientation:mixed;text-transform:uppercase}
.side-tag.atk{color:var(--atk)}.side-tag.def{color:var(--def)}
.side-tag .ico{font-size:18px;writing-mode:horizontal-tb;margin-bottom:4px}
.rail{position:absolute;top:140px;display:flex;flex-direction:column;gap:10px;width:332px}
.rail.left{left:24px}.rail.right{right:24px}
.pcard{position:relative;background:var(--bg-panel);border-radius:4px;overflow:hidden;padding:9px 12px 9px 14px;display:grid;grid-template-columns:46px 1fr;gap:11px;align-items:center;transition:opacity .25s,filter .25s}
.rail.left .pcard{border-left:4px solid var(--side,#fff)}.rail.right .pcard{border-right:4px solid var(--side,#fff)}
.pcard.dead{opacity:.4;filter:grayscale(.7)}.pcard.dead .weapon,.pcard.dead .abilities{visibility:hidden}
.agent{width:46px;height:46px;border-radius:5px;background:var(--bg-panel-2);display:grid;place-items:center;position:relative;font-family:var(--disp);font-weight:700;font-size:22px;overflow:hidden}
.pcard.dead .agent::after{content:'✕';position:absolute;inset:0;display:grid;place-items:center;font-size:26px;color:var(--red);background:rgba(10,14,20,.5)}
.pbody{display:flex;flex-direction:column;gap:5px;min-width:0}
.prow1{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.pname{font-family:var(--cond);font-weight:700;font-size:20px;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ult{display:flex;gap:3px;align-items:center;flex:0 0 auto}
.ult .pip{width:9px;height:9px;transform:rotate(45deg);background:#2b3947;border:1px solid #3c4b5a}
.ult .pip.full{background:var(--teal);border-color:var(--teal);box-shadow:0 0 6px rgba(24,224,196,.6)}
.ult.ready .pip{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(247,210,62,.8)}
.ult.ready{animation:ultglow 1.1s ease-in-out infinite}@keyframes ultglow{50%{filter:brightness(1.35)}}
.prow2{display:flex;align-items:center;justify-content:space-between;gap:8px}
.weapon{display:flex;align-items:center;gap:6px;font-family:var(--cond);font-weight:600;font-size:14px;letter-spacing:1px;text-transform:uppercase;color:var(--dim)}
.credits{font-family:var(--cond);font-weight:700;font-size:14px;color:var(--gold);letter-spacing:.5px}.credits::before{content:'$'}
.abilities{display:flex;gap:4px}
.ab{width:18px;height:18px;border-radius:3px;background:#202c38;border:1px solid #2e3d4b;display:grid;place-items:center;font-family:var(--cond);font-weight:700;font-size:11px;color:#5a6b7a}
.ab.on{background:rgba(24,224,196,.16);border-color:var(--teal);color:var(--teal)}
.prow3{display:flex;align-items:center;gap:7px}
.hpbar{flex:1;height:7px;background:#202c38;border-radius:2px;overflow:hidden}
.hpbar>i{display:block;height:100%;background:linear-gradient(90deg,#caa,#ece8e1);transition:width .25s}
.pcard.dead .hpbar>i{width:0!important}
.shield{display:flex;gap:2px}
.shield .s{width:10px;height:10px;border:1.5px solid #3a4a59;border-radius:1px}
.shield .s.on{background:var(--teal);border-color:var(--teal);box-shadow:0 0 4px rgba(24,224,196,.5)}
.camslot{position:absolute;bottom:28px;left:28px;width:320px;height:180px;background:var(--bg-panel);border:2px solid var(--side-cam,var(--red));border-radius:6px;overflow:hidden;display:none;clip-path:polygon(0 0,100% 0,100% 100%,18px 100%);box-shadow:0 10px 30px rgba(0,0,0,.5)}
.camslot.on{display:block}
.camslot .camlabel{position:absolute;left:0;bottom:0;background:var(--side-cam,var(--red));color:#0a0e14;font-family:var(--cond);font-weight:700;font-size:13px;letter-spacing:2px;padding:4px 14px 4px 12px;text-transform:uppercase;clip-path:polygon(0 0,100% 0,calc(100% - 10px) 100%,0 100%)}
.camslot .camfill{position:absolute;inset:0;display:grid;place-items:center;color:var(--dim);font-family:var(--cond);font-size:14px;letter-spacing:2px;text-transform:uppercase;background:repeating-linear-gradient(45deg,#0f1923,#0f1923 14px,#121d27 14px,#121d27 28px)}

/* ===== control zone (below the 1080 line → off-stream) ===== */
.control-zone{position:absolute;top:1080px;left:0;width:1920px;height:400px;background:#0a0e14;color:var(--ice);padding:14px 22px;border-top:3px solid var(--red);overflow:auto}
.cz-head{display:flex;align-items:center;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.cz-head h1{font-family:'Teko';font-weight:600;font-size:30px;letter-spacing:1px}
.cz-head .tag{color:var(--red)}
.cz-head .obshint{font-size:13px;color:var(--dim);letter-spacing:.3px}
.cz-head .obshint b{color:var(--teal)}
.readout{display:flex;gap:12px;align-items:center;font-family:'Barlow Condensed';font-weight:700;font-size:20px;letter-spacing:1px;margin-left:auto;flex-wrap:wrap}
.readout .vs{font-size:13px;background:#11202c;border:1px solid var(--line);padding:2px 9px;border-radius:20px;color:var(--ice)}
.readout .r{font-size:12px;color:var(--dim);letter-spacing:1px}

.bigrow{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;margin-bottom:8px}
.big{padding:13px 8px;font-size:16px;font-weight:700;border-radius:6px;border:1px solid var(--line);background:#16222e;color:var(--ice);cursor:pointer;letter-spacing:.5px}
.big:hover{border-color:var(--teal)}.big.a{border-bottom:3px solid var(--red)}.big.b{border-bottom:3px solid var(--teal)}
.big.mid{background:#0c141c;color:var(--dim);font-size:14px}
.qrow{display:flex;gap:7px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.qrow .lbl{font-family:'Barlow Condensed';font-size:12px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase}
button{font-family:var(--semi)}
.btn{background:#1b2733;border:1px solid var(--line);color:var(--ice);border-radius:5px;padding:8px 12px;cursor:pointer;font-size:13px}
.btn:hover{border-color:var(--teal)}.btn.on{background:var(--teal);border-color:var(--teal);color:#0a0e14;font-weight:700}
.btn.red{background:var(--red);border-color:var(--red);color:#0a0e14;font-weight:700}
.btn.ghost{background:none;border-style:dashed;color:var(--dim)}
.keys{font-size:12px;color:var(--dim);letter-spacing:.3px;margin:2px 0 10px}
.keys b{display:inline-block;background:#0c141c;border:1px solid var(--line);border-radius:4px;padding:0 6px;color:var(--teal);font-family:'Barlow Condensed';margin:0 1px}

details{border:1px solid var(--line);border-radius:7px;margin-bottom:8px;background:#0f1923}
summary{cursor:pointer;padding:9px 12px;font-family:'Barlow Condensed';font-weight:700;font-size:14px;letter-spacing:1.5px;text-transform:uppercase;color:var(--teal)}
.dwrap{padding:10px 12px;display:flex;flex-wrap:wrap;gap:8px}
.fld{display:flex;align-items:center;gap:6px}
.fld label{font-size:12px;color:var(--dim)}
input,select{background:#0c141c;border:1px solid var(--line);color:var(--ice);border-radius:5px;padding:6px 7px;font:13px var(--semi)}
input[type=text]{width:120px}input[type=number]{width:62px}input[type=color]{width:36px;height:30px;padding:2px}
.step{display:inline-flex;align-items:center;gap:6px}.step b{font-family:'Teko';font-size:18px;min-width:22px;text-align:center}
.pl{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:#0c141c;border:1px solid var(--line);border-radius:6px;padding:7px 9px;margin-bottom:6px;width:100%}
.pip-ctl{display:inline-flex;gap:3px}
</style>
</head>
<body>
<div class="doc" id="doc">

  <!-- ===== STREAMED AREA (transparent in OBS) ===== -->
  <div class="overlay-zone"><div class="stage" id="stage"></div></div>

  <!-- ===== CONTROL AREA (below the screen → not streamed; use OBS 'Interact') ===== -->
  <div class="control-zone">
    <div class="cz-head">
      <h1>발로란트 오버레이 <span class="tag">컨트롤</span></h1>
      <div class="obshint">OBS: 소스 우클릭 → <b>상호작용</b> 으로 조작 · 이 영역은 방송에 안 나옵니다</div>
      <div class="readout" id="readout"></div>
    </div>

    <div class="bigrow">
      <button class="big a" id="winA">◀ 라운드 승</button>
      <button class="big mid" id="swap">⇄ 공수 교체</button>
      <button class="big b" id="winB">라운드 승 ▶</button>
    </div>
    <div class="qrow">
      <span class="lbl">타이머</span>
      <button class="btn" id="tbtn">▶ 시작</button>
      <button class="btn" id="t30">0:30</button>
      <button class="btn" id="t100">1:40</button>
      <button class="btn" id="spike">💣 스파이크</button>
      <span class="lbl" style="margin-left:10px">맵 획득</span>
      <button class="btn" id="mapA">+ A</button>
      <button class="btn" id="mapB">+ B</button>
      <button class="btn ghost" id="newmap">↻ 새 맵(0-0)</button>
      <span class="lbl" style="margin-left:10px">표시</span>
      <button class="btn" id="rails">선수 레일</button>
      <button class="btn" id="camToggle">캠</button>
    </div>
    <div class="keys">단축키 — <b>Q</b> 좌팀 라운드 승 · <b>P</b> 우팀 라운드 승 · <b>S</b> 공수 교체 · <b>Space</b> 타이머 · <b>X</b> 스파이크 · <b>R</b> 1:40 · <b>B</b> 0:30</div>

    <details><summary>팀 설정</summary><div class="dwrap" id="teamSetup"></div></details>
    <details><summary>경기 / 형식</summary><div class="dwrap" id="matchSetup"></div></details>
    <details><summary>캠 (선수/캐스터)</summary><div class="dwrap" id="camSetup"></div></details>
    <details><summary>선수 명단 (옵저버용 · 솔로면 생략 가능)</summary><div class="dwrap" id="playerSetup"></div></details>
    <details><summary>저장 / 초기화</summary><div class="dwrap" id="saveSetup"></div></details>
  </div>
</div>

<script>
/* ---------------- data ---------------- */
const AGENTS=["Jett","Raze","Phoenix","Neon","Reyna","ISO","Sova","Breach","Skye","KAY/O","Fade","Gekko","Tejo","Sage","Cypher","Killjoy","Chamber","Deadlock","Vyse","Brimstone","Omen","Viper","Astra","Harbor","Clove"];
const WEAPONS=["Classic","Ghost","Sheriff","Stinger","Spectre","Bulldog","Guardian","Phantom","Vandal","Marshal","Outlaw","Operator","Ares","Odin","Judge","Bucky"];
const MAPS=["Ascent","Bind","Haven","Split","Icebox","Breeze","Fracture","Pearl","Lotus","Sunset","Abyss","Corrode"];
function P(name,agent,o={}){return Object.assign({name,agent,alive:true,hp:100,shield:2,credits:3900,weapon:"Vandal",ultCur:0,ultMax:7,abilities:{c:true,q:true,e:true}},o);}

const DEFAULT={
  match:{map:"Ascent",round:1,phase:"BUY",timer:30,attackingSide:"A",spike:false,bestOf:3},
  teams:{A:{name:"Team Alpha",tricode:"ALP",color:"#ff4655",score:0,logo:"",mapsWon:0},
         B:{name:"Team Bravo",tricode:"BRV",color:"#18e0c4",score:0,logo:"",mapsWon:0}},
  players:{A:[1,2,3,4,5].map(i=>P("PLAYER"+i,"Jett")),B:[1,2,3,4,5].map(i=>P("PLAYER"+(i+5),"Jett"))},
  cam:{on:false,team:"A",label:"CASTER CAM"},
  ui:{showRails:true}
};

let STATE=load()||JSON.parse(JSON.stringify(DEFAULT));
const mtw=bo=>Math.ceil((bo||1)/2);

/* ---------------- persistence (best-effort) ---------------- */
function save(){try{localStorage.setItem("valo_overlay",JSON.stringify(STATE));}catch(e){}}
function load(){try{const s=localStorage.getItem("valo_overlay");return s?JSON.parse(s):null;}catch(e){return null;}}
function commit(){render();save();syncReadout();}

/* ---------------- helpers ---------------- */
const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const n=document.createElement(t);if(c)n.className=c;if(h!=null)n.innerHTML=h;return n;};
const fmt=s=>{s=Math.max(0,Math.round(s));return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");};
const ini=n=>n.replace(/[^A-Za-z0-9]/g,"").slice(0,2).toUpperCase()||"–";

/* ---------------- overlay render ---------------- */
function ultPips(p){const w=el("div","ult"+(p.ultCur>=p.ultMax?" ready":""));for(let i=0;i<p.ultMax;i++)w.appendChild(el("div","pip"+(i<p.ultCur?" full":"")));return w;}
function abRow(p){const w=el("div","abilities");[["C",p.abilities.c],["Q",p.abilities.q],["E",p.abilities.e]].forEach(([k,o])=>w.appendChild(el("div","ab"+(o?" on":""),k)));return w;}
function shRow(n){const w=el("div","shield");for(let i=0;i<2;i++)w.appendChild(el("div","s"+(i<n?" on":"")));return w;}
function card(p,color){
  const c=el("div","pcard"+(p.alive?"":" dead"));c.style.setProperty("--side",color);
  c.appendChild(el("div","agent",`<span>${ini(p.agent)}</span>`));
  const b=el("div","pbody");
  const r1=el("div","prow1");r1.append(el("div","pname",p.name),ultPips(p));b.appendChild(r1);
  const r2=el("div","prow2");const w=el("div","weapon",`<span style="font-size:15px">▮</span><span>${p.weapon}</span>`);
  const right=el("div");right.style.cssText="display:flex;gap:8px;align-items:center";right.append(abRow(p),el("div","credits",String(p.credits)));
  r2.append(w,right);b.appendChild(r2);
  const r3=el("div","prow3");const hp=el("div","hpbar");hp.appendChild(Object.assign(el("i"),{style:`width:${p.hp}%`}));r3.append(hp,shRow(p.shield));b.appendChild(r3);
  c.appendChild(b);return c;
}
function render(){
  const s=STATE,stage=$("#stage");stage.innerHTML="";
  document.documentElement.style.setProperty("--team-a",s.teams.A.color);
  document.documentElement.style.setProperty("--team-b",s.teams.B.color);
  const bar=el("div","scorebar");
  const tb=(t,k)=>{const x=el("div","team "+(k==="A"?"left":"right"));
    const wrap=el("div","logowrap");const lg=el("div","logo");
    if(t.logo)lg.appendChild(Object.assign(new Image(),{src:t.logo}));else lg.textContent=t.tricode.slice(0,3);
    wrap.appendChild(lg);
    const need=mtw(s.match.bestOf);
    if(need>1){const mp=el("div","mappips");for(let i=0;i<need;i++){const d=el("div","mp"+(i<(t.mapsWon||0)?" won":""));if(i<(t.mapsWon||0)){d.style.background=t.color;d.style.borderColor=t.color;d.style.color=t.color;}mp.appendChild(d);}wrap.appendChild(mp);}
    const m=el("div","meta");m.append(el("div","tricode",t.tricode),el("div","team-name",t.name));x.append(wrap,m);return x;};
  const tag=mode=>{const t=el("div","side-tag "+mode);t.append(el("div","ico",mode==="atk"?"⚔":"🛡"),document.createTextNode(mode==="atk"?"ATK":"DEF"));return t;};
  const center=el("div","center");center.appendChild(el("div","phase-tag",s.match.phase));
  const danger=!s.match.spike&&s.match.timer<=10&&s.match.phase!=="POST";
  center.appendChild(el("div","timer"+(s.match.spike?" spike":(danger?" danger":"")),fmt(s.match.timer)));
  const rl=el("div","round-line");rl.append(el("span",null,"RND "+s.match.round),el("span","map",s.match.map));center.appendChild(rl);
  const aS=s.match.attackingSide==="A"?"atk":"def",bS=s.match.attackingSide==="B"?"atk":"def";
  bar.append(tb(s.teams.A,"A"),el("div","score a",String(s.teams.A.score)),tag(aS),center,tag(bS),el("div","score b",String(s.teams.B.score)),tb(s.teams.B,"B"));
  stage.appendChild(bar);
  if(s.ui.showRails){
    const rA=el("div","rail left");s.players.A.forEach(p=>rA.appendChild(card(p,s.teams.A.color)));stage.appendChild(rA);
    const rB=el("div","rail right");s.players.B.forEach(p=>rB.appendChild(card(p,s.teams.B.color)));stage.appendChild(rB);
  }
  const cam=el("div","camslot"+(s.cam.on?" on":""));cam.style.setProperty("--side-cam",s.cam.team==="A"?s.teams.A.color:s.teams.B.color);
  if(s.cam.team==="B"){cam.style.left="auto";cam.style.right="28px";cam.style.clipPath="polygon(0 0,100% 0,calc(100% - 18px) 100%,0 100%)";}
  cam.append(el("div","camfill","WEBCAM SOURCE"),el("div","camlabel",s.cam.label));stage.appendChild(cam);
}

/* ---------------- readout ---------------- */
function syncReadout(){
  const m=STATE.match,A=STATE.teams.A,B=STATE.teams.B;
  $("#readout").innerHTML=`<span style="color:${A.color}">${A.tricode} ${A.score}</span>
    <span class="vs">${A.mapsWon}–${B.mapsWon} 맵</span>
    <span style="color:${B.color}">${B.score} ${B.tricode}</span>
    <span class="r">R${m.round} · ${m.map} · 공격 ${m.attackingSide==="A"?A.tricode:B.tricode}</span>`;
  $("#winA").textContent=`◀ ${A.tricode} 라운드 승`;
  $("#winB").textContent=`${B.tricode} 라운드 승 ▶`;
}

/* ---------------- actions ---------------- */
let timerInt=null;
function toggleTimer(){
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  else timerInt=setInterval(()=>{STATE.match.timer=Math.max(0,STATE.match.timer-1);commit();if(STATE.match.timer<=0){clearInterval(timerInt);timerInt=null;syncTbtn();}},1000);
  syncTbtn();
}
function syncTbtn(){const b=$("#tbtn");b.textContent=timerInt?"⏸ 정지":"▶ 시작";b.classList.toggle("on",!!timerInt);}
function setTimer(v){STATE.match.timer=v;commit();}
function roundWin(k){STATE.teams[k].score++;STATE.match.round++;commit();}
function swapSides(){STATE.match.attackingSide=STATE.match.attackingSide==="A"?"B":"A";commit();}
function toggleSpike(){STATE.match.spike=!STATE.match.spike;STATE.match.phase=STATE.match.spike?"PLANTED":"LIVE";$("#spike").classList.toggle("red",STATE.match.spike);commit();}
function mapWin(k){STATE.teams[k].mapsWon=Math.min(mtw(STATE.match.bestOf),(STATE.teams[k].mapsWon||0)+1);commit();}
function newMap(){STATE.teams.A.score=0;STATE.teams.B.score=0;STATE.match.round=1;STATE.match.phase="BUY";STATE.match.spike=false;STATE.match.timer=30;$("#spike").classList.remove("red");commit();}

/* ---------------- setup panels ---------------- */
function opt(list,v){return list.map(x=>`<option ${x===v?"selected":""}>${x}</option>`).join("");}
function buildTeamSetup(){
  const w=$("#teamSetup");w.innerHTML="";
  ["A","B"].forEach(k=>{
    const t=STATE.teams[k];
    const name=Object.assign(el("input"),{type:"text",value:t.name});name.style.width="150px";name.oninput=e=>{t.name=e.target.value;commit();};
    const tri=Object.assign(el("input"),{type:"text",value:t.tricode,maxLength:4});tri.style.width="70px";tri.oninput=e=>{t.tricode=e.target.value.toUpperCase();commit();};
    const col=Object.assign(el("input"),{type:"color",value:t.color});col.oninput=e=>{t.color=e.target.value;commit();};
    const logo=Object.assign(el("input"),{type:"text",value:t.logo,placeholder:"로고 URL(선택)"});logo.style.width="150px";logo.oninput=e=>{t.logo=e.target.value;commit();};
    const grp=el("div","fld");
    grp.append(el("label",null,`팀 ${k}`),name,tri,col,logo);
    w.appendChild(grp);
  });
}
function buildMatchSetup(){
  const w=$("#matchSetup");w.innerHTML="";const m=STATE.match;
  const map=el("select",null,opt(MAPS,m.map));map.onchange=e=>{m.map=e.target.value;commit();};
  const bo=el("select",null,opt(["Bo1","Bo3","Bo5"],"Bo"+m.bestOf));bo.onchange=e=>{m.bestOf=+e.target.value.replace("Bo","");commit();buildMatchSetup();};
  const round=Object.assign(el("input"),{type:"number",min:1,value:m.round});round.oninput=e=>{m.round=+e.target.value;commit();};
  const phase=el("select",null,opt(["BUY","LIVE","PLANTED","POST"],m.phase));phase.onchange=e=>{m.phase=e.target.value;commit();};
  const timer=Object.assign(el("input"),{type:"number",min:0,value:m.timer});timer.oninput=e=>{m.timer=+e.target.value;commit();};
  const g=(l,n)=>{const f=el("div","fld");f.append(el("label",null,l),n);return f;};
  w.append(g("맵",map),g("형식",bo),g("라운드",round),g("국면",phase),g("타이머(초)",timer));
  // score + maps steppers
  ["A","B"].forEach(k=>{
    const t=STATE.teams[k];
    const sv=el("b",null,t.score);const sm=el("button","btn","−");sm.onclick=()=>{t.score=Math.max(0,t.score-1);sv.textContent=t.score;commit();};
    const sp=el("button","btn red","+");sp.onclick=()=>{t.score++;sv.textContent=t.score;commit();};
    const f=el("div","fld");f.append(el("label",null,`${t.tricode} 점수`),sm,sv,sp);w.appendChild(f);
  });
}
function buildCamSetup(){
  const w=$("#camSetup");w.innerHTML="";const cam=STATE.cam;
  const on=el("button","btn"+(cam.on?" on":""),cam.on?"캠 ON":"캠 OFF");on.onclick=()=>{cam.on=!cam.on;on.textContent=cam.on?"캠 ON":"캠 OFF";on.classList.toggle("on",cam.on);commit();};
  const pos=el("button","btn",`위치: ${cam.team==="A"?"좌하단":"우하단"}`);pos.onclick=()=>{cam.team=cam.team==="A"?"B":"A";pos.textContent=`위치: ${cam.team==="A"?"좌하단":"우하단"}`;commit();};
  const lab=Object.assign(el("input"),{type:"text",value:cam.label});lab.oninput=e=>{cam.label=e.target.value;commit();};
  const f=el("div","fld");f.append(on,pos,el("label",null,"라벨"),lab);w.appendChild(f);
  w.appendChild(el("div",null,`<div style="font-size:11px;color:#8696a5;width:100%">캠 ON 시 빈 프레임이 생깁니다. OBS에서 실제 웹캠 소스를 그 위치에 겹쳐 올리세요.</div>`));
}
function buildPlayerSetup(){
  const w=$("#playerSetup");w.innerHTML="";
  ["A","B"].forEach(k=>{
    STATE.players[k].forEach((p,i)=>{
      const row=el("div","pl");
      const name=Object.assign(el("input"),{type:"text",value:p.name});name.style.width="100px";name.oninput=e=>{p.name=e.target.value;commit();};
      const agent=el("select",null,opt(AGENTS,p.agent));agent.onchange=e=>{p.agent=e.target.value;commit();};
      const alive=el("button","btn"+(p.alive?" on":""),p.alive?"생존":"사망");alive.onclick=()=>{p.alive=!p.alive;alive.textContent=p.alive?"생존":"사망";alive.classList.toggle("on",p.alive);commit();};
      const wpn=el("select",null,opt(WEAPONS,p.weapon));wpn.onchange=e=>{p.weapon=e.target.value;commit();};
      const hp=Object.assign(el("input"),{type:"number",min:0,max:100,value:p.hp,title:"HP"});hp.oninput=e=>{p.hp=+e.target.value;commit();};
      const sh=el("select",null,opt(["0","1","2"],String(p.shield)));sh.title="방어구";sh.onchange=e=>{p.shield=+e.target.value;commit();};
      const cr=Object.assign(el("input"),{type:"number",min:0,value:p.credits,title:"크레딧"});cr.oninput=e=>{p.credits=+e.target.value;commit();};
      const uc=Object.assign(el("input"),{type:"number",min:0,value:p.ultCur,title:"궁 현재"});uc.style.width="46px";uc.oninput=e=>{p.ultCur=+e.target.value;commit();};
      const um=Object.assign(el("input"),{type:"number",min:1,value:p.ultMax,title:"궁 필요"});um.style.width="46px";um.oninput=e=>{p.ultMax=+e.target.value;commit();};
      const ab=el("div","pip-ctl");["c","q","e"].forEach(key=>{const b=el("button","btn"+(p.abilities[key]?" on":""),key.toUpperCase());b.style.padding="4px 8px";b.onclick=()=>{p.abilities[key]=!p.abilities[key];b.classList.toggle("on",p.abilities[key]);commit();};ab.append(b);});
      row.append(el("label",null,k+(i+1)),name,agent,alive,el("label",null,"무기"),wpn,el("label",null,"HP"),hp,el("label",null,"방어"),sh,el("label",null,"$"),cr,el("label",null,"궁"),uc,el("span",null,"/"),um,el("label",null,"스킬"),ab);
      w.appendChild(row);
    });
  });
}
function buildSaveSetup(){
  const w=$("#saveSetup");w.innerHTML="";
  const reset=el("button","btn red","전체 초기화(0-0, 기본팀)");reset.onclick=()=>{if(confirm("모든 값을 기본값으로 되돌릴까요?")){STATE=JSON.parse(JSON.stringify(DEFAULT));commit();buildAll();}};
  const info=el("div",null,`<div style="font-size:11px;color:#8696a5;width:100%">입력한 팀/설정은 이 PC에 자동 저장되어 OBS를 다시 켜도 유지됩니다(가능한 경우).</div>`);
  w.append(reset,info);
}
function buildAll(){buildTeamSetup();buildMatchSetup();buildCamSetup();buildPlayerSetup();buildSaveSetup();syncReadout();syncTbtn();}

/* ---------------- wire quick buttons ---------------- */
$("#winA").onclick=()=>roundWin("A");
$("#winB").onclick=()=>roundWin("B");
$("#swap").onclick=swapSides;
$("#tbtn").onclick=toggleTimer;
$("#t30").onclick=()=>setTimer(30);
$("#t100").onclick=()=>setTimer(100);
$("#spike").onclick=toggleSpike;
$("#mapA").onclick=()=>mapWin("A");
$("#mapB").onclick=()=>mapWin("B");
$("#newmap").onclick=newMap;
$("#rails").onclick=()=>{STATE.ui.showRails=!STATE.ui.showRails;$("#rails").classList.toggle("on",STATE.ui.showRails);commit();};
$("#camToggle").onclick=()=>{STATE.cam.on=!STATE.cam.on;$("#camToggle").classList.toggle("on",STATE.cam.on);commit();};

/* ---------------- keyboard ---------------- */
document.addEventListener("keydown",e=>{
  const tag=(e.target.tagName||"").toLowerCase();
  if(tag==="input"||tag==="select"||tag==="textarea")return;
  const m={q:()=>roundWin("A"),p:()=>roundWin("B"),s:swapSides," ":toggleTimer,x:toggleSpike,r:()=>setTimer(100),b:()=>setTimer(30)};
  const fn=m[e.key.toLowerCase()];if(fn){e.preventDefault();fn();}
});

/* ---------------- OBS detection + scaling ---------------- */
function detectOBS(){if(window.obsstudio){document.body.classList.add("obs");}}
detectOBS();setTimeout(detectOBS,500);
function fit(){const k=Math.min(1,window.innerWidth/1920);$("#doc").style.transform=`scale(${k})`;document.body.style.height=(1480*k)+"px";document.body.style.width=(1920*k)+"px";}
window.addEventListener("resize",fit);

/* init */
render();fit();buildAll();
$("#spike").classList.toggle("red",STATE.match.spike);
$("#rails").classList.toggle("on",STATE.ui.showRails);
$("#camToggle").classList.toggle("on",STATE.cam.on);
</script>
</body>
</html>
